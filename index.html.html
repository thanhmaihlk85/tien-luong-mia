<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tiền Lương Của Mia</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#fff0f5;--surface:#ffffff;--surface2:#fce4ec;--border:#f8bbd0;
  --accent:#e91e8c;--accent2:#f06292;--green:#2e7d32;--green-bg:#e8f5e933;
  --red:#c62828;--red-bg:#ffebee55;--text:#3d1a2e;--muted:#ad6f8a;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Sora',sans-serif;min-height:100vh;padding:16px 8px 60px;}
.wrap{max-width:100%;margin:0 auto;padding:0 12px;}
header{text-align:center;margin-bottom:32px;}
header h1{font-family:'Space Mono',monospace;font-size:clamp(1.4rem,3.5vw,2.1rem);font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px;}
header p{color:var(--muted);font-size:.85rem;}
.tabs{display:flex;gap:4px;margin-bottom:24px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:5px;}
.tab-btn{flex:1;border:none;border-radius:8px;padding:9px;cursor:pointer;font-family:'Sora',sans-serif;font-size:.83rem;font-weight:500;color:var(--muted);background:transparent;transition:all .2s;}
.tab-btn.active{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
.page{display:none;}.page.active{display:block;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:18px;}
.card-title{font-size:.72rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:18px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
@media(max-width:520px){.form-grid{grid-template-columns:1fr;}}
.field{display:flex;flex-direction:column;gap:5px;}
.field label{font-size:.78rem;color:var(--muted);font-weight:500;}
.field input,.field select{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Sora',sans-serif;font-size:.88rem;padding:9px 13px;outline:none;transition:border-color .2s;}
.field input:focus,.field select:focus{border-color:var(--accent);}
.field-full{grid-column:1/-1;}
.days-wrap{display:flex;gap:7px;flex-wrap:wrap;}
.day-btn{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--muted);cursor:pointer;font-family:'Sora',sans-serif;font-size:.78rem;font-weight:500;padding:7px 11px;transition:all .2s;user-select:none;}
.day-btn.active{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:transparent;color:#fff;}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:10px;color:#fff;cursor:pointer;font-family:'Sora',sans-serif;font-size:.9rem;font-weight:600;padding:12px 24px;transition:opacity .2s,transform .15s;width:100%;margin-top:4px;}
.btn-primary:hover{opacity:.87;transform:translateY(-1px);}
/* student table */
.stbl{width:100%;border-collapse:collapse;margin-bottom:10px;}
.stbl th{font-size:.72rem;color:var(--muted);font-weight:500;padding:6px 10px;text-align:left;border-bottom:1px solid var(--border);}
.stbl td{padding:5px 4px;vertical-align:middle;}
.stbl td:first-child{width:28px;text-align:center;color:var(--muted);font-size:.75rem;}
.stbl input[type=text]{background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'Sora',sans-serif;font-size:.85rem;padding:7px 10px;outline:none;width:100%;transition:border-color .2s;}
.stbl input[type=date]{background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'Sora',sans-serif;font-size:.82rem;padding:7px 8px;outline:none;width:100%;transition:border-color .2s;}
.stbl input:focus{border-color:var(--accent);}
.btn-rm{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:1.1rem;padding:2px 6px;transition:color .2s;line-height:1;}
.btn-rm:hover{color:var(--red);}
.btn-add-row{background:transparent;border:1px dashed var(--border);border-radius:8px;color:var(--muted);cursor:pointer;font-family:'Sora',sans-serif;font-size:.82rem;padding:8px;transition:all .2s;width:100%;}
.btn-add-row:hover{border-color:var(--accent);color:var(--accent);}
/* class cards */
.class-list{display:flex;flex-direction:column;gap:16px;}
.class-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;animation:slideIn .3s ease;}
@keyframes slideIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.class-header{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:14px 20px;background:var(--surface2);border-bottom:1px solid var(--border);cursor:pointer;}
.class-name{font-weight:600;font-size:.95rem;flex:1;min-width:120px;}
.class-meta{font-size:.75rem;color:var(--muted);}
.class-badge{background:var(--surface);border:1px solid var(--border);border-radius:20px;font-size:.72rem;color:var(--muted);padding:3px 10px;white-space:nowrap;}
.chevron{color:var(--muted);font-size:.85rem;transition:transform .25s;}
.chevron.collapsed{transform:rotate(-90deg);}
.btn-del{background:transparent;border:1px solid #f8717133;border-radius:6px;color:var(--red);cursor:pointer;font-size:.72rem;padding:3px 8px;transition:all .2s;}
.btn-del:hover{background:#f8717122;}
/* attendance table */
.att-wrap{padding:16px;overflow-x:visible;}
.scroll-hint{font-size:.68rem;color:var(--muted);text-align:right;margin-bottom:8px;}
.att-table{border-collapse:collapse;width:100%;table-layout:auto;}
.att-table th,.att-table td{border:1px solid var(--border);text-align:center;padding:0;}
.att-table thead th{background:var(--surface2);color:var(--muted);font-weight:500;padding:7px 5px;white-space:nowrap;font-size:.75rem;}
.att-table thead th.sth{font-family:'Space Mono',monospace;font-size:.845rem;color:var(--accent);min-width:49px;width:49px;}
.att-table thead th.sth .dow{color:var(--muted);font-size:.78rem;display:block;}
.name-td{text-align:left!important;padding:4px 6px!important;font-size:.98rem;font-weight:500;white-space:nowrap;min-width:66px;max-width:66px;overflow:hidden;text-overflow:ellipsis;}
.no-td{font-family:'Space Mono',monospace;color:var(--muted);font-size:.7rem;padding:8px 8px!important;min-width:32px;}
.start-td{font-size:.56rem;color:var(--muted);padding:8px 4px!important;white-space:nowrap;min-width:54px;}
.sum-td{padding:8px 6px!important;font-family:'Space Mono',monospace;font-size:.78rem;background:var(--surface2);min-width:42px;}
.check-cell{width:49px;height:36px;cursor:pointer;transition:background .15s;}
.check-cell.present{background:var(--green-bg);}
.check-cell.absent{background:var(--red-bg);}
.check-cell.na{background:#ffffff06;cursor:default;}
.check-cell .ico{font-size:.41rem;line-height:36px;display:block;}
.check-cell.na .ico{font-size:.3rem;color:var(--muted);}
/* ctx */
.ctx{position:fixed;z-index:999;background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:0 8px 32px #f06292aa;animation:pop .15s ease;}
@keyframes pop{from{opacity:0;transform:scale(.9);}to{opacity:1;transform:scale(1);}}
.ctx-item{padding:9px 16px;cursor:pointer;font-size:.82rem;display:flex;align-items:center;gap:8px;transition:background .15s;}
.ctx-item:hover{background:var(--surface2);}
/* summary */
.sum-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;}
.sum-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;}
.sum-class-name{font-weight:600;margin-bottom:12px;font-size:.9rem;}
.sum-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.sum-lbl{font-size:.75rem;color:var(--muted);}
.sum-val{font-family:'Space Mono',monospace;font-size:.82rem;}
.pb-wrap{height:5px;background:var(--border);border-radius:99px;overflow:hidden;margin-top:10px;}
.pb{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:99px;transition:width .4s;}
.empty{text-align:center;color:var(--muted);padding:50px 0;}
.empty span{display:block;font-size:2rem;margin-bottom:10px;}
.btn-del-stu{background:transparent;border:1px solid #f8717144;border-radius:4px;color:var(--red);cursor:pointer;font-size:.65rem;padding:1px 5px;margin-left:6px;opacity:0;transition:all .2s;vertical-align:middle;}
tr:hover .btn-del-stu{opacity:1;}
.btn-del-stu:hover{background:#f8717122;}
.btn-add-stu{background:transparent;border:1px solid var(--accent);border-radius:6px;color:var(--accent);cursor:pointer;font-size:.72rem;padding:3px 10px;transition:all .2s;white-space:nowrap;}
.btn-add-stu:hover{background:#6c8fff22;}
/* Modal */
.modal-bg{position:fixed;inset:0;background:#f06292aa;z-index:500;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;width:340px;max-width:95vw;box-shadow:0 16px 48px #f0629244;}
.modal h3{font-size:.9rem;font-weight:600;margin-bottom:16px;color:var(--text);}
.modal input{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Sora',sans-serif;font-size:.88rem;padding:9px 13px;outline:none;width:100%;margin-bottom:10px;transition:border-color .2s;}
.modal input:focus{border-color:var(--accent);}
.modal-btns{display:flex;gap:8px;margin-top:4px;}
.modal-btns button{flex:1;border:none;border-radius:8px;cursor:pointer;font-family:'Sora',sans-serif;font-size:.85rem;font-weight:500;padding:10px;}
.btn-modal-ok{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;}
.btn-modal-cancel{background:var(--surface2);border:1px solid var(--border)!important;color:var(--muted);}
.tip{font-size:.73rem;color:var(--muted);background:var(--surface2);border-radius:8px;padding:8px 12px;margin-bottom:12px;border-left:3px solid var(--accent2);}
.stu-block{overflow-x:auto;border-bottom:1px solid var(--border);}
.stu-block:last-child{border-bottom:none;}

.fee-td{padding:4px 6px!important;min-width:72px;}
.fee-td input{background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'Sora',sans-serif;font-size:.62rem;padding:3px 5px;outline:none;width:64px;text-align:right;transition:border-color .2s;}
.fee-td input:focus{border-color:var(--accent);}
.paid-td{padding:6px 8px!important;min-width:80px;text-align:center!important;}
.paid-btn{border:none;border-radius:8px;cursor:pointer;font-size:.75rem;font-family:'Sora',sans-serif;font-weight:500;padding:4px 10px;transition:all .2s;}
.paid-btn.unpaid{background:var(--surface2);border:1px solid var(--border);color:var(--muted);}
.paid-btn.paid{background:var(--green-bg);border:1px solid var(--green);color:var(--green);}

/* Column resize */
.att-table th{position:relative;}
.col-resizer{position:absolute;right:-3px;top:0;width:6px;height:100%;cursor:col-resize;z-index:10;user-select:none;}
.col-resizer:hover,.col-resizer.active{background:var(--accent);opacity:.5;border-radius:3px;}

/* Inline name edit */
.name-td span.name-text{cursor:pointer;border-bottom:1px dashed transparent;transition:border-color .2s;}
.name-td span.name-text:hover{border-bottom:1px dashed var(--accent);}
.name-td input.name-edit{background:var(--surface2);border:1px solid var(--accent);border-radius:5px;color:var(--text);font-family:'Sora',sans-serif;font-size:.82rem;font-weight:500;padding:2px 5px;outline:none;width:100%;min-width:54px;}

/* Class tabs */
.class-tabs-bar{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:16px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:5px;}
.class-tab-btn{flex:none;border:none;border-radius:8px;padding:8px 16px;cursor:pointer;font-family:'Sora',sans-serif;font-size:.83rem;font-weight:500;color:var(--muted);background:transparent;transition:all .2s;white-space:nowrap;}
.class-tab-btn.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;}
.class-tab-btn:hover:not(.active){background:var(--surface2);color:var(--text);}
.class-content{animation:slideIn .25s ease;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🌸 Tiền Lương Của Mia</h1>
    <p>Quản lý lương & điểm danh học sinh</p>
  </header>
  <div class="tabs">
    <button class="tab-btn active" onclick="goTab('page-classes',this)">🏫 Lớp Học</button>
    <button class="tab-btn" onclick="goTab('page-add',this)">➕ Tạo Lớp Mới</button>
    <button class="tab-btn" onclick="goTab('page-summary',this)">📊 Tổng Hợp</button>
  </div>

  <div class="page active" id="page-classes">
    <div id="class-tabs-bar" class="class-tabs-bar"></div>
    <div id="class-content" class="class-content"></div>
  </div>

  <div class="page" id="page-add">
    <div class="card">
      <div class="card-title">Thông Tin Lớp</div>
      <div class="form-grid">
        <div class="field">
          <label>Tên lớp / Nhóm</label>
          <input type="text" id="inp-cname" placeholder="VD: Lớp Toán T3-T5">
        </div>
        <div class="field">
          <label>Số buổi của khoá</label>
          <input type="number" id="inp-sessions" value="24" min="1" max="200" placeholder="VD: 24">
        </div>
        <div class="field field-full">
          <label>Lịch học (chọn thứ)</label>
          <div class="days-wrap" id="days-pick">
            <button class="day-btn" data-d="1">Thứ 2</button>
            <button class="day-btn" data-d="2">Thứ 3</button>
            <button class="day-btn" data-d="3">Thứ 4</button>
            <button class="day-btn" data-d="4">Thứ 5</button>
            <button class="day-btn" data-d="5">Thứ 6</button>
            <button class="day-btn" data-d="6">Thứ 7</button>
            <button class="day-btn" data-d="0">CN</button>
          </div>
        </div>
        <div class="field">
          <label>Giờ bắt đầu</label>
          <input type="time" id="inp-ts" value="17:30">
        </div>
        <div class="field">
          <label>Giờ kết thúc</label>
          <input type="time" id="inp-te" value="19:00">
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Danh Sách Học Sinh</div>
      <div class="tip">💡 Mỗi bạn có thể bắt đầu vào ngày khác nhau — ô có dấu <b>—</b> là buổi trước ngày bắt đầu của bạn đó (không tính). Nhập ngày dạng <b>dd/mm/yyyy</b></div>
      <table class="stbl">
        <thead><tr><th>#</th><th style="width:99%">Họ tên</th><th style="min-width:135px">Ngày bắt đầu</th><th></th></tr></thead>
        <tbody id="student-rows"></tbody>
      </table>
      <button class="btn-add-row" onclick="addRow()">+ Thêm học sinh</button>
    </div>
    <div class="card" style="padding:16px">
      <button class="btn-primary" onclick="createClass()">🎓 Tạo Lớp Học</button>
    </div>
  </div>

  <div class="page" id="page-summary">
    <div id="sum-content"></div>
  </div>
</div>

<!-- Add student modal -->
<div class="modal-bg" id="add-stu-modal" style="display:none">
  <div class="modal">
    <h3>➕ Thêm Học Sinh Vào Lớp</h3>
    <input type="text" id="modal-name" placeholder="Họ tên học sinh...">
    <input type="text" id="modal-start" placeholder="Ngày bắt đầu (dd/mm/yyyy)" maxlength="10">
    <div class="modal-btns">
      <button class="btn-modal-cancel" onclick="closeAddStudent()">Huỷ</button>
      <button class="btn-modal-ok" onclick="confirmAddStudent()">Thêm</button>
    </div>
  </div>
</div>

<div class="ctx" id="ctx" style="display:none">
  <div class="ctx-item" onclick="setAtt('present')">✅ Có mặt</div>
  <div class="ctx-item" onclick="setAtt('absent')">❌ Vắng</div>
  <div class="ctx-item" onclick="setAtt(null)">⬜ Xoá</div>
</div>

<script>
const VI_DAYS=['CN','T2','T3','T4','T5','T6','T7'];
// Tính thứ an toàn từ chuỗi YYYY-MM-DD, tránh lỗi timezone
function getDOW(iso){
  const[y,m,d]=iso.split('-').map(Number);
  // Tomohiko Sakamoto algorithm
  const t=[0,3,2,5,0,3,5,1,4,6,2,4];
  const yy=m<3?y-1:y;
  return(yy+Math.floor(yy/4)-Math.floor(yy/100)+Math.floor(yy/400)+t[m-1]+d)%7;
}
let classes=JSON.parse(localStorage.getItem('lop_hoc_v3')||'[]');
let ctxT=null;
function save(){localStorage.setItem('lop_hoc_v3',JSON.stringify(classes));}

function goTab(id,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
  if(id==='page-classes')renderClasses();
  if(id==='page-summary')renderSummary();
}

document.querySelectorAll('.day-btn').forEach(b=>b.onclick=()=>b.classList.toggle('active'));

const TODAY=new Date().toISOString().split('T')[0];
// Patch: read value correctly after user picks date
function getDateVal(input){return normalizeDate(input.value);}

function toDisplay(iso){
  if(!iso)return '';
  const[y,m,d]=iso.split('-');return d+'/'+m+'/'+y;
}
function addRow(name='',start=''){
  const tb=document.getElementById('student-rows');
  const idx=tb.children.length+1;
  const display=start?toDisplay(start):toDisplay(TODAY);
  const tr=document.createElement('tr');
  tr.innerHTML=`<td>${idx}</td>
    <td><input type="text" placeholder="Họ tên học sinh..." value="${name}"></td>
    <td><input type="text" class="date-inp" placeholder="dd/mm/yyyy" value="${display}" maxlength="10" style="text-align:center"></td>
    <td><button class="btn-rm" onclick="removeRow(this)">×</button></td>`;
  tb.appendChild(tr);
  // auto-format as user types
  const di=tr.querySelector('.date-inp');
  di.addEventListener('input',function(){
    let v=this.value.replace(/[^0-9]/g,'');
    if(v.length>2)v=v.slice(0,2)+'/'+v.slice(2);
    if(v.length>5)v=v.slice(0,5)+'/'+v.slice(5);
    if(v.length>10)v=v.slice(0,10);
    this.value=v;
  });
  if(!name)tr.querySelector('input[type=text]').focus();
}
function removeRow(btn){
  const tb=document.getElementById('student-rows');
  if(tb.children.length<=1)return;
  btn.closest('tr').remove();
  [...tb.children].forEach((r,i)=>r.cells[0].textContent=i+1);
}
addRow();

function normalizeDate(val){
  if(!val)return '';
  val=val.trim();
  if(/^\d{4}-\d{2}-\d{2}$/.test(val))return val; // YYYY-MM-DD ok
  if(/^\d{2}\/\d{2}\/\d{4}$/.test(val)){
    const[d,m,y]=val.split('/');return y+'-'+m.padStart(2,'0')+'-'+d.padStart(2,'0');
  }
  if(/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(val)){
    const[d,m,y]=val.split('/');return y+'-'+m.padStart(2,'0')+'-'+d.padStart(2,'0');
  }
  return val;
}
function genSessions(start,days,count){
  const list=[];
  // parse ngày thủ công tránh timezone
  let[y,m,d]=start.split('-').map(Number);
  while(list.length<count){
    const iso=y+'-'+String(m).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    if(days.includes(getDOW(iso)))list.push(iso);
    // tăng ngày
    d++;
    const daysInMonth=[0,31,((y%4===0&&y%100!==0)||y%400===0)?29:28,31,30,31,30,31,31,30,31,30,31];
    if(d>daysInMonth[m]){d=1;m++;if(m>12){m=1;y++;}}
  }
  return list;
}

function createClass(){
  const cname=document.getElementById('inp-cname').value.trim();
  const sessionCount=parseInt(document.getElementById('inp-sessions').value)||24;
  const ts=document.getElementById('inp-ts').value;
  const te=document.getElementById('inp-te').value;
  const days=[...document.querySelectorAll('#days-pick .day-btn.active')].map(b=>+b.dataset.d);
  if(!cname){alert('Nhập tên lớp!');return;}
  if(!days.length){alert('Chọn ít nhất 1 ngày học!');return;}
  const rows=[...document.querySelectorAll('#student-rows tr')];
  const students=rows.map(r=>({
    name:r.cells[1].querySelector('input[type=text]').value.trim(),
    start:normalizeDate(r.cells[2].querySelector('input[type=text]').value)
  })).filter(s=>s.name&&s.start);
  if(!students.length){alert('Thêm ít nhất 1 học sinh!');return;}
  const starts=students.map(s=>s.start).sort();
  const classStart=starts[0];
  // allSessions = đúng sessionCount buổi tính từ ngày sớm nhất
  const allSessions=genSessions(classStart,days,sessionCount);
  const classEnd=allSessions[allSessions.length-1];
  const attendance=students.map(s=>({start:s.start,data:{}}));
  const newId=Date.now();
  classes.push({id:newId,name:cname,classStart,classEnd,days,timeStart:ts,timeEnd:te,sessionCount,allSessions,students:students.map(s=>s.name),attendance});
  activeClassId=newId;
  save();
  document.getElementById('inp-cname').value='';
  document.getElementById('inp-sessions').value='24';
  document.querySelectorAll('#days-pick .day-btn.active').forEach(b=>b.classList.remove('active'));
  document.getElementById('student-rows').innerHTML='';
  addRow();
  goTab('page-classes',document.querySelector('.tab-btn'));
}

function deleteStudent(classId,si){
  if(!confirm("Xóa học sinh này khỏi lớp?"))return;
  const cls=classes.find(c=>c.id===classId);if(!cls)return;
  cls.students.splice(si,1);
  cls.attendance.splice(si,1);
  save();
  renderClasses();
}
let addStuClassId = null;

function openAddStudent(classId){
  addStuClassId = classId;
  const cls = classes.find(c=>c.id===classId);
  // prefill start with class start date displayed
  const[y,m,d] = cls.classStart.split('-');
  document.getElementById('modal-start').value = d+'/'+m+'/'+y;
  document.getElementById('modal-name').value = '';
  document.getElementById('add-stu-modal').style.display = 'flex';
  setTimeout(()=>document.getElementById('modal-name').focus(), 100);
  // auto-format date input
  const inp = document.getElementById('modal-start');
  inp.oninput = function(){
    let v=this.value.replace(/[^0-9]/g,'');
    if(v.length>2)v=v.slice(0,2)+'/'+v.slice(2);
    if(v.length>5)v=v.slice(0,5)+'/'+v.slice(5);
    if(v.length>10)v=v.slice(0,10);
    this.value=v;
  };
}

function closeAddStudent(){
  document.getElementById('add-stu-modal').style.display = 'none';
  addStuClassId = null;
}

function confirmAddStudent(){
  const name = document.getElementById('modal-name').value.trim();
  const startRaw = document.getElementById('modal-start').value.trim();
  if(!name){ alert('Nhập tên học sinh!'); return; }
  if(!startRaw){ alert('Nhập ngày bắt đầu!'); return; }
  const start = normalizeDate(startRaw);
  if(!start){ alert('Ngày không hợp lệ! Nhập dạng dd/mm/yyyy'); return; }
  const cls = classes.find(c=>c.id===addStuClassId);
  if(!cls) return;
  cls.students.push(name);
  cls.attendance.push({start, data:{}});
  // nếu start sớm hơn classStart, mở rộng allSessions
  if(start < cls.classStart){
    cls.classStart = start;
    cls.allSessions = genSessions(cls.classStart, cls.days, cls.sessionCount||cls.allSessions.length);
  }
  save();
  closeAddStudent();
  renderClasses();
}

let activeClassId=null;

function renderClasses(){
  const bar=document.getElementById('class-tabs-bar');
  const content=document.getElementById('class-content');
  if(!classes.length){
    bar.innerHTML='';
    content.innerHTML='<div class="empty"><span>🏫</span>Chưa có lớp nào. Bấm "Tạo Lớp Mới"!</div>';
    activeClassId=null;
    return;
  }
  // Nếu activeClassId không còn tồn tại, chọn lớp đầu
  if(!activeClassId||!classes.find(c=>c.id===activeClassId)){
    activeClassId=classes[0].id;
  }
  // Render tab bar
  bar.innerHTML=classes.map(c=>`<button class="class-tab-btn${c.id===activeClassId?' active':''}" onclick="switchClassTab(${c.id})">${c.name}</button>`).join('');
  // Render nội dung lớp đang active
  const cls=classes.find(c=>c.id===activeClassId);
  content.innerHTML=cls?buildCard(cls):'';
}

function switchClassTab(id){
  activeClassId=id;
  renderClasses();
}

function buildCard(cls){
  const dayNames=cls.days.map(d=>VI_DAYS[d]).join(', ');
  const taught=cls.allSessions.filter(s=>cls.attendance.some(a=>s>=a.start&&(a.data[s]==='present'||a.data[s]==='absent'))).length;

  // Mỗi học sinh có bảng riêng với header buổi tính từ ngày bắt đầu của em đó
  const studentTables=cls.students.map((name,si)=>{
    const att=cls.attendance[si];
    const start=att.start;
    const sc=cls.sessionCount||cls.allSessions.length;
    const mySessions=genSessions(start,cls.days,sc);
    let pc=0,ac=0;
    const thCells=mySessions.map(s=>{
      const[sy,sm,sd]=s.split('-').map(Number);
      return`<th class="sth">${sd}/${sm}<span class="dow">${VI_DAYS[getDOW(s)]}</span></th>`;
    }).join('');
    const dataCells=mySessions.map(s=>{
      const val=att.data[s];
      if(val==='present')pc++;
      if(val==='absent')ac++;
      let ico='',c2='';
      if(val==='present'){ico='✅';c2='present';}
      else if(val==='absent'){ico='❌';c2='absent';}
      return`<td class="check-cell ${c2}" onclick="openCtx(event,${cls.id},${si},'${s}')"><span class="ico">${ico}</span></td>`;
    }).join('');
    const[_y,_m,_d]=start.split('-');const sf=`${_d}/${_m}`;
    return`<div class="stu-block">
      <table class="att-table">
        <thead><tr>
          <th style="width:32px">#</th>
          <th style="text-align:left;padding:7px 6px;min-width:66px;max-width:66px;font-family:'Space Mono',monospace;color:var(--accent);font-size:.72rem">Họ Tên</th>
          <th style="min-width:54px;font-family:'Space Mono',monospace;color:var(--accent);font-size:.72rem">Bắt đầu</th>
          ${thCells}
          <th style="min-width:40px;font-family:'Space Mono',monospace;color:var(--accent);font-size:.72rem">✅</th>
          <th style="min-width:40px;font-family:'Space Mono',monospace;color:var(--accent);font-size:.72rem">❌</th>
          <th style="min-width:90px;font-family:'Space Mono',monospace;color:var(--accent);font-size:.72rem">💰 Học phí</th>
          <th style="min-width:80px;font-family:'Space Mono',monospace;color:var(--accent);font-size:.72rem">✔ Đã đóng</th>
        </tr></thead>
        <tbody><tr>
          <td class="no-td">${si+1}</td>
          <td class="name-td"><span class="name-text" onclick="startEditName(this,${cls.id},${si})" title="Bấm để đổi tên">${name}</span> <button class="btn-del-stu" onclick="deleteStudent(${cls.id},${si})" title="Xóa học sinh">×</button></td>
          <td class="start-td">từ ${sf}</td>
          ${dataCells}
          <td class="sum-td" style="color:var(--green)">${pc}</td>
          <td class="sum-td" style="color:var(--red)">${ac}</td>
          <td class="fee-td"><input type="text" inputmode="numeric" placeholder="0 ₫" value="${att.fee||''}" onchange="setFee(${cls.id},${si},this.value)" onclick="event.stopPropagation()"></td>
          <td class="paid-td" onclick="event.stopPropagation()"><button class="paid-btn ${att.paid?'paid':'unpaid'}" onclick="event.stopPropagation();togglePaid(event,${cls.id},${si})">${att.paid?'✔ Đã đóng':'Chưa đóng'}</button></td>
        </tr></tbody>
      </table>
    </div>`;
  }).join('');

  return`<div class="class-card" id="cc-${cls.id}">
    <div class="class-header" onclick="toggleAtt(${cls.id})">
      <div class="class-name">🏫 ${cls.name}</div>
      <div class="class-meta">${dayNames} · ${cls.timeStart}–${cls.timeEnd}</div>
      <div class="class-badge">${cls.students.length} học sinh</div>
      <div class="class-badge">${taught}/${cls.allSessions.length} buổi</div>
      <button class="btn-add-stu" onclick="event.stopPropagation();openAddStudent(${cls.id})">+ Thêm HS</button>
      <button class="btn-del" onclick="event.stopPropagation();deleteClass(${cls.id})">Xóa</button>
      <span class="chevron" id="chv-${cls.id}">▾</span>
    </div>
    <div class="att-wrap" id="att-${cls.id}">
      ${studentTables}
    </div>
  </div>`;
}

function toggleAtt(id){
  const el=document.getElementById(`att-${id}`);
  const chv=document.getElementById(`chv-${id}`);
  const hidden=el.style.display==='none';
  el.style.display=hidden?'':'none';
  chv.classList.toggle('collapsed',!hidden);
}
function deleteClass(id){
  if(!confirm('Xóa lớp này?'))return;
  classes=classes.filter(c=>c.id!==id);if(activeClassId===id)activeClassId=null;save();renderClasses();
}

function openCtx(e,classId,si,date){
  e.stopPropagation();ctxT={classId,si,date};
  const m=document.getElementById('ctx');m.style.display='block';
  let x=e.clientX,y=e.clientY;
  if(x+150>window.innerWidth)x=window.innerWidth-160;
  if(y+120>window.innerHeight)y=window.innerHeight-130;
  m.style.left=x+'px';m.style.top=y+'px';
}
document.addEventListener('click',(e)=>{if(!e.target.closest('.paid-btn'))document.getElementById('ctx').style.display='none';});

function setAtt(val){
  if(!ctxT)return;
  const{classId,si,date}=ctxT;
  const cls=classes.find(c=>c.id===classId);if(!cls)return;
  if(val===null)delete cls.attendance[si].data[date];
  else cls.attendance[si].data[date]=val;
  save();
  renderClasses();
}

function setFee(classId, si, val){
  const cls=classes.find(c=>c.id===classId);if(!cls)return;
  cls.attendance[si].fee=val.trim();
  save();
}

function togglePaid(e, classId, si){
  e.stopPropagation();
  const cls=classes.find(c=>c.id===classId);if(!cls)return;
  cls.attendance[si].paid=!cls.attendance[si].paid;
  save();
  renderClasses();
}


function startEditName(span, classId, si){
  const current = span.textContent;
  const inp = document.createElement('input');
  inp.className = 'name-edit';
  inp.value = current;
  span.replaceWith(inp);
  inp.focus();
  inp.select();
  function save(){
    const newName = inp.value.trim()||current;
    const cls = classes.find(c=>c.id===classId);
    if(cls){ cls.students[si]=newName; save(); }
    const s = document.createElement('span');
    s.className='name-text';
    s.title='Bấm để đổi tên';
    s.textContent=newName;
    s.onclick=function(){startEditName(this,classId,si);};
    inp.replaceWith(s);
  }
  inp.addEventListener('blur', save);
  inp.addEventListener('keydown', e=>{
    if(e.key==='Enter') inp.blur();
    if(e.key==='Escape'){ inp.value=current; inp.blur(); }
  });
}

function renderSummary(){
  const el=document.getElementById('sum-content');
  if(!classes.length){el.innerHTML='<div class="empty"><span>📊</span>Chưa có dữ liệu.</div>';return;}
  const cards=classes.map(cls=>{
    const total=cls.allSessions.length;
    const taught=cls.allSessions.filter(s=>cls.attendance.some(a=>s>=a.start&&(a.data[s]==='present'||a.data[s]==='absent'))).length;
    const pct=total?Math.round(taught/total*100):0;
    const rows=cls.students.map((name,si)=>{
      const att=cls.attendance[si];
      const my=cls.allSessions.filter(s=>s>=att.start);
      const p=my.filter(s=>att.data[s]==='present').length;
      const ab=my.filter(s=>att.data[s]==='absent').length;
      return`<div class="sum-row"><span class="sum-lbl">${name}</span><span class="sum-val"><span style="color:var(--green)">${p}✅</span> <span style="color:var(--red)">${ab}❌</span> / ${my.length}</span></div>`;
    }).join('');
    return`<div class="sum-card"><div class="sum-class-name">🏫 ${cls.name}</div>
      <div class="sum-row"><span class="sum-lbl">Buổi đã dạy</span><span class="sum-val">${taught}/${total}</span></div>
      <div class="pb-wrap"><div class="pb" style="width:${pct}%"></div></div>
      <div style="height:12px"></div>${rows}</div>`;
  }).join('');
  el.innerHTML=`<div class="sum-grid">${cards}</div>`;
}

renderClasses();

// ── Column resize ────────────────────────────────────────────
function initColResize(table){
  const ths=table.querySelectorAll('thead th');
  ths.forEach(th=>{
    // Xoá resizer cũ nếu có
    const old=th.querySelector('.col-resizer');
    if(old)old.remove();
    const resizer=document.createElement('div');
    resizer.className='col-resizer';
    th.appendChild(resizer);
    let startX,startW;
    resizer.addEventListener('mousedown',e=>{
      e.stopPropagation();
      e.preventDefault();
      startX=e.clientX;
      startW=th.offsetWidth;
      resizer.classList.add('active');
      const onMove=e=>{
        const w=Math.max(30,startW+(e.clientX-startX));
        th.style.width=w+'px';
        th.style.minWidth=w+'px';
        th.style.maxWidth=w+'px';
      };
      const onUp=()=>{
        resizer.classList.remove('active');
        document.removeEventListener('mousemove',onMove);
        document.removeEventListener('mouseup',onUp);
      };
      document.addEventListener('mousemove',onMove);
      document.addEventListener('mouseup',onUp);
    });
    // Touch support
    resizer.addEventListener('touchstart',e=>{
      e.stopPropagation();
      const t=e.touches[0];
      startX=t.clientX;startW=th.offsetWidth;
      resizer.classList.add('active');
      const onMove=e=>{
        const t=e.touches[0];
        const w=Math.max(30,startW+(t.clientX-startX));
        th.style.width=w+'px';th.style.minWidth=w+'px';th.style.maxWidth=w+'px';
      };
      const onEnd=()=>{
        resizer.classList.remove('active');
        document.removeEventListener('touchmove',onMove);
        document.removeEventListener('touchend',onEnd);
      };
      document.addEventListener('touchmove',onMove,{passive:true});
      document.addEventListener('touchend',onEnd);
    },{passive:true});
  });
}

// Gắn resize sau mỗi lần render
const _origBuildCard=buildCard;
// Hook vào renderClasses và setAtt để tự init sau render
function initAllResizers(){
  document.querySelectorAll('.att-table').forEach(t=>initColResize(t));
}
// Override renderClasses
const _origRenderClasses=renderClasses;
// Dùng MutationObserver để tự động init khi DOM thay đổi
new MutationObserver(()=>{
  document.querySelectorAll('.att-table').forEach(t=>{
    if(!t.dataset.resizeInit){
      t.dataset.resizeInit='1';
      initColResize(t);
    }
  });
}).observe(document.getElementById('class-content'),{childList:true,subtree:true});
// Init lần đầu
setTimeout(initAllResizers,100);

</script>
